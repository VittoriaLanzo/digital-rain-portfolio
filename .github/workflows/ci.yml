name: CI

# Run on every PR targeting main, and on direct pushes to main
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. TYPE-CHECK  — catches TypeScript errors before they ship
  # ─────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────
  # 2. LINT  — catches style/correctness issues (errors block, warnings pass)
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run eslint (zero errors allowed)
        run: npm run lint -- --max-warnings 0

  # ─────────────────────────────────────────────────────────────────────
  # 3. BUILD  — proves the production bundle compiles end-to-end
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Vite — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────
  # 4. SUMMARY  — single required status check to configure in branch rules
  #    (require "CI / All checks passed" in the branch protection settings)
  # ─────────────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [type-check, lint, build]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          if [[ "${{ needs.type-check.result }}" != "success" || \
                "${{ needs.lint.result }}"       != "success" || \
                "${{ needs.build.result }}"      != "success" ]]; then
            echo "One or more checks failed."
            echo "  type-check : ${{ needs.type-check.result }}"
            echo "  lint       : ${{ needs.lint.result }}"
            echo "  build      : ${{ needs.build.result }}"
            exit 1
          fi
          echo "All checks passed ✓"
