name: CI

# Run on every PR targeting main, and on direct pushes to main
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. TYPE-CHECK  — catches TypeScript errors before they ship
  # ─────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript — type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────
  # 2. LINT  — catches style/correctness issues (errors block, warnings pass)
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: ESLint — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run eslint (zero errors allowed)
        run: npm run lint -- --max-warnings 0

  # ─────────────────────────────────────────────────────────────────────
  # 3. BUILD  — proves the production bundle compiles end-to-end
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Vite — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────
  # 4. SMOKE TEST  — verify live site returns HTTP 200
  #    Set LIVE_SITE_URL in repo/org secrets (Settings → Secrets → Actions)
  # ─────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test — live site HTTP 200
    runs-on: ubuntu-latest
    # Skip gracefully if no LIVE_SITE_URL secret is configured
    if: vars.LIVE_SITE_URL != '' || secrets.LIVE_SITE_URL != ''
    env:
      LIVE_URL: ${{ secrets.LIVE_SITE_URL || vars.LIVE_SITE_URL }}
    steps:
      - name: Check live site returns HTTP 200
        run: |
          if [ -z "$LIVE_URL" ]; then
            echo "LIVE_SITE_URL not configured — skipping smoke test."
            exit 0
          fi
          echo "Smoke-testing: $LIVE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$LIVE_URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed ✓"

  # ─────────────────────────────────────────────────────────────────────
  # 5. SUMMARY  — single required status check to configure in branch rules
  #    (require "CI / All checks passed" in the branch protection settings)
  # ─────────────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [type-check, lint, build]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          if [[ "${{ needs.type-check.result }}" != "success" || \
                "${{ needs.lint.result }}"       != "success" || \
                "${{ needs.build.result }}"      != "success" ]]; then
            echo "One or more checks failed."
            echo "  type-check : ${{ needs.type-check.result }}"
            echo "  lint       : ${{ needs.lint.result }}"
            echo "  build      : ${{ needs.build.result }}"
            exit 1
          fi
          echo "All checks passed ✓"
